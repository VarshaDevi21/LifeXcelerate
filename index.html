<!DOCTYPE html>
<html>
<head>
<title>Hospital</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#f2f2f2;
}

h1{
font-size:55px;
color:red;
}

input{
padding:12px;
font-size:18px;
width:200px;
}

button{
padding:12px 25px;
font-size:18px;
background:green;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}
</style>

<script>
function checkID(){
var pid=document.getElementById("pid").value;

if(pid=="5525"){
window.location="patient.html";
}
else{
alert("Invalid Patient ID");
}
}
</script>

</head>

<body>

<h1>Apollo Hospital</h1>

<h2>Enter Patient ID</h2>

<input type="text" id="pid" placeholder="Enter PID">

<br><br>

<button onclick="checkID()">View Details</button>

</body>
</html>
