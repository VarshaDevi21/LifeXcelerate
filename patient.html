<!DOCTYPE html>
<html>

<head>
<title>Smart Ambulance Tracking</title>

<style>

body{
font-family:Arial;
background:#eaf4ff;
margin:0;
}

/* Header */

.header{
background:#1976d2;
color:white;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

/* Main Container */

.container{
width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

/* Patient Photo */

.patient-photo{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:4px solid #1976d2;
}

/* Patient Details */

.details{
text-align:center;
font-size:16px;
line-height:28px;
}

.details b{
color:#1976d2;
}

/* Hospital Title */

.hospital{
margin-top:20px;
font-size:20px;
color:#444;
text-align:center;
}

/* Map */

#map{
height:420px;
width:100%;
margin-top:20px;
border-radius:10px;
border:2px solid #e0e0e0;
}

/* Map Icons */

.emojiIcon{
font-size:32px;
}

</style>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

</head>

<body>

<div class="header">
🚑 Smart Ambulance Tracking System
</div>

<div class="container">

<h2 style="text-align:center;">Patient Information</h2>

<!-- Patient Photo -->

<img class="patient-photo" src="./patient.jpeg">

<div class="details">
<p><b>Name:</b> Ravi Kumar</p>
<p><b>Age:</b> 45</p>
<p><b>Weight:</b> 70 kg</p>
<p><b>Height:</b> 170 cm</p>
<p><b>patient ID:</b> 5525</p>
<p><b>Blood Group:</b> O+</p>
</div>

<h3 class="hospital">🏥 Nearest Hospital : Apollo Hospital</h3>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>

/* Create Map */

var map = L.map('map').setView([9.9252,78.1198],13);

/* Map Tiles */

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

/* Hospital Location */

var hospital=[9.9177,78.1484];

/* Hospital Icon */

var hospitalIcon=L.divIcon({
html:"🏥",
className:"emojiIcon",
iconSize:[30,30]
});

/* Hospital Marker */

L.marker(hospital,{icon:hospitalIcon})
.addTo(map)
.bindPopup("🏥 Apollo Hospital");

/* Get Ambulance GPS Location */

navigator.geolocation.getCurrentPosition(function(position){

var user=[
position.coords.latitude,
position.coords.longitude
];

/* Ambulance Icon */

var ambulanceIcon=L.divIcon({
html:"🚑",
className:"emojiIcon",
iconSize:[30,30]
});

/* Ambulance Marker */

L.marker(user,{icon:ambulanceIcon})
.addTo(map)
.bindPopup("🚑 Ambulance Location");

/* Route */

L.Routing.control({

waypoints:[
L.latLng(user[0],user[1]),
L.latLng(hospital[0],hospital[1])
],

lineOptions:{
styles:[
{color:'blue',weight:6}
]
},

addWaypoints:false,
routeWhileDragging:false,

createMarker:function(){
return null;
}

}).addTo(map);

map.setView(user,14);

});

</script>

</body>

</html>
